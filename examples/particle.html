<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>particle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>
    <script type="module">
        import { PrepEngine, Camera, Transform, GameObject, World, Utils, ParticleEmitter, Particle } from '../index.js';

        const canvas = document.getElementById('gameCanvas');
        const engine = new PrepEngine(canvas);
        engine.init();

        const world = new World(new Camera());
        // Use convenience helpers: set a particle template and emit a burst at world origin
        world.setParticleTemplate(new Particle({
            color: new Utils.RGBA(255, 128, 0, 1),
            size: { min: 3, max: 8 },
            lifetime: { min: 0.8, max: 1.8 },
            speed: { min: 30, max: 120 },
            primitiveShape: 'circle'
        }));

        // Emit a burst of particles at world center (0,0)
        world.emitAt(new Utils.Vec2(0, 0), 100);

        // no keyboard interactions in this simple particle example

        window.onload = () => {
            engine.resizeCanvas();
        };
        window.onresize = () => {
            engine.resizeCanvas();
        };

        engine.setWorld(world);

        engine.run();
    </script>
</body>

</html>
