<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>particle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>
    <script type="module">
        import { PrepEngine, Camera, Transform, GameObject, World, Utils, ParticleEmitter, Particle } from '../index.js';

        const canvas = document.getElementById('gameCanvas');
        const engine = new PrepEngine(canvas);
        engine.init();

        const world = new World(new Camera());
        const p = new Particle({ color: new Utils.RGBA(0, 0, 0, 1) });
        world.particleEmitter.particle = p;
        world.particleEmitter.emit();

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                target.transform.position.x += 10;
            } else if (e.key === 'ArrowLeft') {
                target.transform.position.x -= 10;
            } else if (e.key === 'ArrowUp') {
                target.transform.position.y -= 10;
            } else if (e.key === 'ArrowDown') {
                target.transform.position.y += 10;
            }
        });

        window.onload = () => {
            engine.resizeCanvas();
        };
        window.onresize = () => {
            engine.resizeCanvas();
        };

        engine.setWorld(world);

        engine.run();
    </script>
</body>

</html>
